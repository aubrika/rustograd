name: Deploy viewer to GitHub Pages

# Publishes the static viewer in viz/ (the wasm is pre-built + inlined, so there's
# nothing to compile here). Site lands at https://aubrika.github.io/rustograd/.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; newer pushes supersede in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viz            # serve the viewer folder as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
